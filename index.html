<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMAPA LIBRARY | Official</title>
 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { smapa: '#0ea5e9' }, borderRadius: { 'smapa': '1.5rem' } } } }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
    .view-section { display: none; }
    .active-view { display: block; animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .badge { @apply text-[9px] font-black uppercase px-2 py-1 rounded-lg border; }
    .badge-diajukan { @apply bg-yellow-50 text-yellow-600 border-yellow-200; }
    .badge-diproses { @apply bg-blue-50 text-blue-600 border-blue-200; }
    .badge-dipinjam { @apply bg-purple-50 text-purple-600 border-purple-200; }
    .badge-selesai { @apply bg-green-50 text-green-600 border-green-200; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

  <nav class="fixed top-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-smapa rounded-lg shadow-lg"></div>
      <h1 class="font-black text-lg tracking-tighter uppercase">SMAPA-LIB</h1>
    </div>
    <div id="nav-actions"></div>
  </nav>

  <div id="login-view" class="view-section active-view flex flex-col items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-[380px] bg-white dark:bg-slate-900 p-8 rounded-smapa shadow-2xl border dark:border-slate-800">
      <div class="flex mb-8 bg-slate-100 dark:bg-slate-800 p-1 rounded-2xl">
        <button onclick="app.toggleAuth('login')" id="tab-l" class="w-1/2 py-2 rounded-xl font-bold text-smapa bg-white dark:bg-slate-700 shadow-sm">MASUK</button>
        <button onclick="app.toggleAuth('register')" id="tab-r" class="w-1/2 py-2 rounded-xl font-bold text-slate-400">DAFTAR</button>
      </div>
      <div id="auth-form" class="space-y-3">
        <div id="reg-fields" class="hidden"><input type="text" id="f-name" placeholder="Nama Lengkap" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 outline-none"></div>
        <input type="tel" id="f-phone" placeholder="WhatsApp" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 outline-none">
        <input type="password" id="f-pass" placeholder="Password" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 outline-none">
        <button onclick="app.handleAuth()" class="w-full bg-smapa text-white font-black py-4 rounded-2xl shadow-xl mt-4">AKSES</button>
      </div>
      <p id="auth-msg" class="text-center mt-4 text-xs font-bold text-red-500"></p>
    </div>
  </div>

  <div id="user-view" class="view-section pt-24 pb-10 px-6 max-w-6xl mx-auto">
    <div id="leaderboard" class="mb-8 flex gap-3 overflow-x-auto pb-2 scrollbar-hide"></div>

    <div class="flex gap-4 border-b dark:border-slate-800 mb-8 font-bold text-sm">
      <button onclick="app.switchTab('books-cont', this)" class="tab-btn py-2 border-b-2 border-smapa text-smapa">📚 KOLEKSI BUKU</button>
      <button onclick="app.switchTab('news-cont', this)" class="tab-btn py-2 text-slate-400">📰 NEWSPAPER</button>
    </div>

    <div id="books-cont" class="tab-view">
      <div class="flex gap-3 mb-8">
        <input type="text" id="q-book" onkeyup="app.renderBooks()" placeholder="🔍 Cari Judul Buku..." class="flex-grow p-4 rounded-2xl bg-white dark:bg-slate-900 shadow-sm outline-none focus:ring-2 focus:ring-smapa">
        <button onclick="app.toggleTheme()" class="bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border dark:border-slate-800">🌓</button>
      </div>
      <div id="book-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
    </div>

    <div id="news-cont" class="tab-view hidden">
      <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <div id="admin-view" class="view-section pt-24 pb-10 px-6 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <div class="lg:col-span-4 space-y-6">
        <div class="bg-white dark:bg-slate-900 p-6 rounded-smapa shadow-xl border-t-4 border-smapa">
          <h3 class="font-black text-smapa mb-4 uppercase text-sm">📚 Tambah Buku</h3>
          <div class="space-y-3">
            <input type="text" id="a-title" placeholder="Judul" class="w-full p-2 border rounded dark:bg-slate-800 text-sm">
            <input type="text" id="a-drive" placeholder="Google Drive ID (PDF)" class="w-full p-2 border rounded dark:bg-slate-800 text-sm">
            <input type="file" id="a-cover" accept="image/*" class="text-[10px]">
            <button onclick="app.addBook()" class="w-full bg-smapa text-white font-black py-2 rounded-xl mt-2">SIMPAN</button>
          </div>
        </div>
        <div class="bg-white dark:bg-slate-900 p-6 rounded-smapa shadow-xl border-t-4 border-pink-500">
          <h3 class="font-black text-pink-500 mb-4 uppercase text-sm">📰 Update News</h3>
          <div class="space-y-3">
            <select id="n-platform" class="w-full p-2 border rounded dark:bg-slate-800 text-sm">
              <option value="instagram">Instagram</option><option value="tiktok">TikTok</option><option value="facebook">Facebook</option>
            </select>
            <input type="text" id="n-link" placeholder="Link Postingan" class="w-full p-2 border rounded dark:bg-slate-800 text-sm">
            <input type="text" id="n-cap" placeholder="Caption Singkat" class="w-full p-2 border rounded dark:bg-slate-800 text-sm">
            <button onclick="app.addNews()" class="w-full bg-pink-500 text-white font-black py-2 rounded-xl">POST KE MADING</button>
          </div>
        </div>
      </div>
      <div class="lg:col-span-8 bg-white dark:bg-slate-900 p-6 rounded-smapa shadow-xl overflow-x-auto">
        <h3 class="font-black mb-6 uppercase text-sm">📋 Pengajuan Pinjam</h3>
        <table class="w-full text-left text-xs whitespace-nowrap">
          <thead class="bg-slate-50 dark:bg-slate-800">
            <tr><th class="p-3">SISWA</th><th class="p-3">BUKU</th><th class="p-3">STATUS</th><th class="p-3 text-right">AKSI</th></tr>
          </thead>
          <tbody id="admin-table-body" class="divide-y dark:divide-slate-800"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-smapa shadow-2xl p-6 overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-center mb-4">
        <h2 id="md-title" class="font-black text-smapa uppercase"></h2>
        <button onclick="app.closeModal()" class="text-2xl font-bold">×</button>
      </div>
      
      <div id="md-actions" class="hidden grid grid-cols-2 gap-3 mb-6">
        <button id="btn-read" class="bg-green-500 text-white font-black py-3 rounded-xl">📖 BACA ONLINE</button>
        <a id="btn-down" href="#" target="_blank" class="bg-blue-500 text-white font-black py-3 rounded-xl text-center">📥 DOWNLOAD PDF</a>
      </div>
      <div id="iframe-box" class="hidden mb-6"><iframe id="md-iframe" class="w-full h-[400px] border rounded-xl shadow-inner"></iframe></div>

      <div class="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl">
        <h4 class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">Pinjam Buku Fisik</h4>
        <input type="text" id="md-nis" placeholder="Masukkan NIS" class="w-full p-3 rounded-xl bg-white dark:bg-slate-700 outline-none mb-3 border dark:border-slate-600">
        <button onclick="app.submitBorrow()" class="w-full bg-smapa text-white font-black py-3 rounded-xl shadow-lg">AJUKAN PINJAMAN</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyMwPN1PaTml4M-wummKf4QmoqU0ruA5E27a0Dt_VzC5PQ2BO6Ylc0DoBhDdh7OVGck/exec"; 
    let authMode = 'login';
    const app = {
      user: JSON.parse(localStorage.getItem('smapa_v4_user')),
      books: [], news: [], borrows: [], users: [], activeBookId: null,

      init() { if(this.user) this.route(); if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark'); },
      toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); },
      toggleAuth(m) { 
        authMode = m; 
        document.getElementById('tab-l').className = m === 'login' ? "w-1/2 py-2 rounded-xl font-bold text-smapa bg-white dark:bg-slate-700 shadow-sm" : "w-1/2 py-2 rounded-xl font-bold text-slate-400";
        document.getElementById('tab-r').className = m === 'register' ? "w-1/2 py-2 rounded-xl font-bold text-smapa bg-white dark:bg-slate-700 shadow-sm" : "w-1/2 py-2 rounded-xl font-bold text-slate-400";
        document.getElementById('reg-fields').classList.toggle('hidden', m === 'login');
      },
      switchTab(tid, btn) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.getElementById(tid).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('text-smapa', 'border-b-2', 'border-smapa'); b.classList.add('text-slate-400'); });
        btn.classList.add('text-smapa', 'border-b-2', 'border-smapa');
      },
      async handleAuth() {
        const ph = document.getElementById('f-phone').value, ps = document.getElementById('f-pass').value, nm = document.getElementById('f-name').value;
        const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:authMode, phone:ph, password:ps, name:nm }) }).then(r=>r.json());
        if(res.status === 'success') {
          if(authMode === 'login') { this.user = res.data; localStorage.setItem('smapa_v4_user', JSON.stringify(this.user)); this.route(); }
          else { alert('Sukses! Silakan Login'); this.toggleAuth('login'); }
        } else alert(res.message);
      },
      route() {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
        document.getElementById('nav-actions').innerHTML = `<button onclick="app.logout()" class="text-red-500 font-bold text-[10px] border px-3 py-1 rounded-lg">LOGOUT</button>`;
        if(this.user.role === 'admin') { document.getElementById('admin-view').classList.add('active-view'); this.loadAdminData(); }
        else { document.getElementById('user-view').classList.add('active-view'); this.loadUserData(); }
      },
      async loadUserData() {
        const [b, l, n] = await Promise.all([fetch(API_URL+"?action=getBooks").then(r=>r.json()), fetch(API_URL+"?action=getLeaderboard").then(r=>r.json()), fetch(API_URL+"?action=getNews").then(r=>r.json())]);
        this.books = b.data; this.renderBooks();
        document.getElementById('leaderboard').innerHTML = l.data.map((u,i) => `<div class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm min-w-[100px] border border-smapa/20 text-center"><div class="text-[8px] font-black opacity-40">RANK #${i+1}</div><div class="font-bold text-xs truncate">${u.name}</div><div class="text-[9px] font-black text-smapa">${u.points} PTS</div></div>`).join('');
        this.renderNews(n.data);
      },
      renderBooks() {
        const q = document.getElementById('q-book').value.toLowerCase();
        document.getElementById('book-grid').innerHTML = this.books.filter(b => b.title.toLowerCase().includes(q)).map(b => `
          <div onclick="app.openModal('${b.id}')" class="bg-white dark:bg-slate-900 p-3 rounded-2xl shadow-sm border dark:border-slate-800 cursor-pointer hover:scale-105 transition">
            <img src="${b.cover_base64 || 'https://via.placeholder.com/150'}" class="w-full h-40 object-cover rounded-xl mb-2">
            <h4 class="text-xs font-bold line-clamp-2">${b.title}</h4>
            <span class="text-[9px] font-black text-smapa uppercase">Katalog</span>
          </div>
        `).join('');
      },
      renderNews(data) {
        document.getElementById('news-grid').innerHTML = data.reverse().map(n => {
          let embed = "";
          if(n.platform === 'instagram') embed = `<iframe src="${n.link.split('?')[0]}/embed" class="w-full h-[400px] rounded-xl border-none"></iframe>`;
          else if(n.platform === 'tiktok') embed = `<iframe src="https://www.tiktok.com/embed/v2/${n.link.split('/video/')[1]?.split('?')[0]}" class="w-full h-[500px] rounded-xl border-none"></iframe>`;
          else embed = `<div class="p-10 bg-slate-100 dark:bg-slate-800 rounded-xl text-center"><a href="${n.link}" target="_blank" class="text-smapa font-bold">Buka ${n.platform}</a></div>`;
          return `<div class="bg-white dark:bg-slate-900 p-4 rounded-smapa shadow-lg border dark:border-slate-800"><div class="badge badge-diproses mb-3">${n.platform}</div>${embed}<p class="mt-3 text-xs italic opacity-70">${n.caption}</p></div>`;
        }).join('');
      },
      async loadAdminData() {
        const [br, u, b] = await Promise.all([fetch(API_URL+"?action=getBorrowings").then(r=>r.json()), fetch(API_URL+"?action=getUsers").then(r=>r.json()), fetch(API_URL+"?action=getBooks").then(r=>r.json())]);
        this.borrows = br.data; this.users = u.data; this.books = b.data;
        document.getElementById('admin-table-body').innerHTML = this.borrows.reverse().map(h => {
          const usr = this.users.find(x => x.id === h.user_id) || { name: 'Siswa', phone: '0' };
          const bk = this.books.find(x => x.id === h.book_id) || { title: 'Dihapus' };
          let act = h.status === 'Diajukan' ? `<button onclick="app.upStat('${h.id}', 'Diproses', '${h.user_id}')" class="bg-smapa text-white px-2 py-1 rounded text-[8px] font-bold">TERIMA</button>` :
                    h.status === 'Diproses' ? `<button onclick="app.upStat('${h.id}', 'Dipinjam', '${h.user_id}')" class="bg-purple-500 text-white px-2 py-1 rounded text-[8px] font-bold">SERAHKAN</button>` :
                    h.status === 'Dipinjam' ? `<button onclick="app.upStat('${h.id}', 'Selesai', '${h.user_id}')" class="bg-green-600 text-white px-2 py-1 rounded text-[8px] font-bold">KEMBALI</button>` : "";
          return `<tr><td class="p-3"><b>${usr.name}</b></td><td class="p-3">${bk.title}</td><td class="p-3 text-center"><span class="badge badge-${h.status.toLowerCase()}">${h.status}</span></td><td class="p-3 text-right">${act}</td></tr>`;
        }).join('');
      },
      async addBook() {
        const file = document.getElementById('a-cover').files[0];
        let b64 = ""; if(file) { b64 = await new Promise(r => { const f=new FileReader(); f.onload=e=>r(e.target.result); f.readAsDataURL(file); }); }
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'addBook', role:'admin', title:document.getElementById('a-title').value, drive_id:document.getElementById('a-drive').value, cover_base64:b64 }) });
        alert('Tersimpan!'); location.reload();
      },
      async addNews() {
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'addNews', role:'admin', platform:document.getElementById('n-platform').value, link:document.getElementById('n-link').value, caption:document.getElementById('n-cap').value }) });
        alert('News Posted!'); location.reload();
      },
      async upStat(id, s, u) { await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateStatus', id, new_status:s, user_id:u, role:'admin' }) }); this.loadAdminData(); },
      openModal(id) {
        this.activeBookId = id; const b = this.books.find(x=>x.id===id);
        document.getElementById('md-title').innerText = b.title;
        document.getElementById('md-actions').classList.toggle('hidden', !b.drive_id);
        document.getElementById('btn-down').href = b.drive_id ? `https://drive.google.com/uc?export=download&id=${b.drive_id}` : "#";
        document.getElementById('btn-read').onclick = () => {
          document.getElementById('iframe-box').classList.remove('hidden');
          document.getElementById('md-iframe').src = `https://drive.google.com/file/d/${b.drive_id}/preview`;
        };
        document.getElementById('modal').classList.remove('hidden');
      },
      closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('md-iframe').src=""; document.getElementById('iframe-box').classList.add('hidden'); },
      async submitBorrow() {
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'borrowBook', user_id:this.user.id, book_id:this.activeBookId, nis:document.getElementById('md-nis').value, duration:'7 Hari' }) });
        alert('Pengajuan Berhasil!'); this.closeModal();
      },
      logout() { localStorage.removeItem('smapa_v4_user'); location.reload(); }
    };
    window.onload = () => app.init();
  </script>
</body>
</html>
